#cloud-config
# deploy/node/cloud-init.yaml — OPTIONAL #cloud-config wrapper around
# deploy/node/cloud-init.sh.
#
# In variant B you can paste cloud-init.sh DIRECTLY as Vultr user_data (Vultr's
# cloud-init runs a `#!`-prefixed script as-is). This YAML form is provided for
# environments/UIs that prefer a #cloud-config document.
#
# ── GENERATION ────────────────────────────────────────────────────────────────
# The generator (in variant B: the bot) must:
#   1. take deploy/node/cloud-init.sh,
#   2. substitute __ORCH_URL__ / __SECRET__ / __JOB_ID__,
#   3. base64-encode the result,
#   4. substitute the marker __CLOUD_INIT_B64__ below with that base64 string.
# Using base64 here means there is NO second copy of the script to drift — the
# .sh remains the single source of truth.
write_files:
  - path: /root/netrun-cloud-init.sh
    permissions: '0755'
    owner: 'root:root'
    encoding: b64
    content: __CLOUD_INIT_B64__
runcmd:
  - [ bash, /root/netrun-cloud-init.sh ]
